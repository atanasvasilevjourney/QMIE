[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
addopts = -ra --tb=short --strict-markers
filterwarnings =
    ignore::DeprecationWarning:pydantic._internal._fields
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    network: marks tests that need real network (skipped in CI by default)
