# ─── QMIE — Docker Compose ──────────────────────────────────────────────
# Production stack:
#   qmie    — FastAPI webhook server
#   redis   — (optional) idempotency + future queue backing
#
# Run:
#   docker compose --env-file ../python/.env up -d --build
#
# Behind a reverse proxy (Caddy/Traefik/Nginx)? Terminate TLS there
# and forward to qmie:8080. Always set X-Forwarded-For so the
# IP allowlist works.

services:

  qmie:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: qmie:latest
    container_name: qmie
    restart: unless-stopped
    env_file:
      - ../python/.env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data         # SQLite + logs persistence
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - redis
    networks:
      - qmie_net
    # Resource caps — webhook bridge should never need much
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: qmie_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - ./redis_data:/data
    networks:
      - qmie_net

networks:
  qmie_net:
    driver: bridge
